<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f6f2" />
    <title>Convivia24</title>
    <style>
      :root {
        color: #171717;
        background: #f8f6f2;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        box-sizing: border-box;
      }
      main {
        max-width: 360px;
        text-align: center;
      }
      img {
        width: 88px;
        height: 88px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 34px;
        font-style: italic;
      }
      p {
        margin: 0;
        color: #6b6258;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon.svg" alt="" />
      <h1>Convivia24</h1>
      <p>Connect to the internet to open the staffing app.</p>
    </main>
  </body>
</html>
